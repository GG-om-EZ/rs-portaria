{% extends "base.html" %}
{% block conteudo %}
{% include "_passos.html" %}
<h1>Serviços</h1>
<form method="post" action="/propostas/{{ prop.id }}/servicos" class="cartao">
  {% if prop.tipo == "continuo" %}
    <label>Início do turno <input name="hora_inicio_turno" type="time" value="{{ dados.hora_inicio_turno or '18:00' }}" required></label>
    <label>Fim do turno <input name="hora_fim_turno" type="time" value="{{ dados.hora_fim_turno or '06:00' }}" required></label>
    <label>Plantões por mês (por profissional)
      <input name="plantoes_mes" inputmode="numeric" value="{{ dados.plantoes_mes or plantoes_padrao }}"></label>
  {% else %}
    <label>Comunicação <select name="comunicacao">
      <option value="">- não se aplica -</option>
      {% for op in ["Rádio de comunicação (fornecido pelo PRESTADOR)", "Rádio de comunicação (fornecido pela CONTRATANTE)"] %}
      <option {{ 'selected' if dados.comunicacao == op }}>{{ op }}</option>
      {% endfor %}
    </select></label>
  {% endif %}

  <label>Trajes <select name="trajes">
    {% for op in ["Fardamento padrão da empresa prestadora", "Uniforme básico RS Portaria", "Terno/traje social", "Uniforme específico (detalhar em observações)"] %}
    <option {{ 'selected' if dados.trajes == op }}>{{ op }}</option>
    {% endfor %}
  </select></label>

  <h2>Funções e quantidades</h2>
  {% for f in funcoes %}
  <label>{{ f.nome }} - base {{ f.valor_base_centavos | brl }}
    <input name="qtd_{{ f.id }}" inputmode="numeric" value="{{ qtd_atuais.get(f.id, 0) }}">
  </label>
  {% endfor %}

  <label>Observações <textarea name="observacoes" rows="3">{{ dados.observacoes or '' }}</textarea></label>
  {% if erro %}<p class="erro">{{ erro }}</p>{% endif %}
  <button>Calcular custos e continuar</button>
</form>
{% endblock %}
